<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <defs>
    <style>
      .title { font: 700 26px -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif; fill:#0f172a; }
      .sub { font: 500 14px -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif; fill:#334155; }
      .lbl { font: 700 16px -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif; fill:#0f172a; }
      .txt { font: 500 14px -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif; fill:#0f172a; }
      .axis { stroke:#94a3b8; stroke-width:2; }
      .grid { stroke:#e2e8f0; stroke-width:1; }
      .bar-parse { fill:#60a5fa; }
      .bar-dl { fill:#34d399; }
      .bar-exec { fill:#f97316; }
      .bar-wait { fill:#cbd5e1; }
      .box { fill:#ffffff; stroke:#94a3b8; stroke-width:2; rx:14; }
      .note { fill:#f8fafc; stroke:#94a3b8; stroke-width:2; rx:14; }
      .arrow { stroke:#334155; stroke-width:2.5; fill:none; marker-end:url(#mEnd); }
    </style>
    <marker id="mEnd" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"></path>
    </marker>
  </defs>

  <text x="60" y="60" class="title">script：普通 / defer / async 的执行时序（与 HTML 解析的关系）</text>
  <text x="60" y="90" class="sub">蓝：HTML 解析｜绿：脚本下载｜橙：脚本执行｜灰：解析被阻塞/等待</text>

  <!-- Timeline area -->
  <rect x="60" y="120" width="1080" height="470" class="box"/>

  <!-- grid -->
  <line x1="120" y1="160" x2="120" y2="560" class="grid"/>
  <line x1="300" y1="160" x2="300" y2="560" class="grid"/>
  <line x1="480" y1="160" x2="480" y2="560" class="grid"/>
  <line x1="660" y1="160" x2="660" y2="560" class="grid"/>
  <line x1="840" y1="160" x2="840" y2="560" class="grid"/>
  <line x1="1020" y1="160" x2="1020" y2="560" class="grid"/>

  <!-- axis -->
  <line x1="100" y1="560" x2="1100" y2="560" class="axis"/>
  <text x="1040" y="588" class="sub">时间 →</text>

  <!-- Labels -->
  <text x="90" y="190" class="lbl">普通 &lt;script&gt;</text>
  <text x="90" y="310" class="lbl">defer</text>
  <text x="90" y="430" class="lbl">async</text>

  <!-- Normal: parse -> block(wait) while download+exec -> parse -->
  <!-- Parse part 1 -->
  <rect x="300" y="170" width="220" height="34" class="bar-parse" rx="8"/>
  <text x="310" y="193" class="txt">HTML 解析</text>
  <!-- Wait (blocked) -->
  <rect x="520" y="170" width="260" height="34" class="bar-wait" rx="8"/>
  <text x="530" y="193" class="txt">解析暂停</text>
  <!-- Download -->
  <rect x="540" y="212" width="140" height="26" class="bar-dl" rx="8"/>
  <text x="548" y="231" class="txt">下载</text>
  <!-- Execute -->
  <rect x="690" y="212" width="80" height="26" class="bar-exec" rx="8"/>
  <text x="696" y="231" class="txt">执行</text>
  <!-- Parse part 2 -->
  <rect x="780" y="170" width="260" height="34" class="bar-parse" rx="8"/>
  <text x="790" y="193" class="txt">继续解析</text>

  <!-- Defer: parse continues, download in parallel, execute after parse done -->
  <rect x="300" y="290" width="620" height="34" class="bar-parse" rx="8"/>
  <text x="310" y="313" class="txt">HTML 解析（不中断）</text>
  <rect x="520" y="332" width="260" height="26" class="bar-dl" rx="8"/>
  <text x="528" y="351" class="txt">下载（并行）</text>
  <rect x="920" y="290" width="120" height="34" class="bar-exec" rx="8"/>
  <text x="928" y="313" class="txt">解析完再执行</text>

  <!-- Async: parse continues, download in parallel, execute immediately when ready (interrupts parse) -->
  <rect x="300" y="410" width="240" height="34" class="bar-parse" rx="8"/>
  <text x="310" y="433" class="txt">HTML 解析</text>
  <rect x="520" y="452" width="180" height="26" class="bar-dl" rx="8"/>
  <text x="528" y="471" class="txt">下载（并行）</text>
  <!-- Interrupt parse when script ready -->
  <rect x="540" y="410" width="160" height="34" class="bar-wait" rx="8"/>
  <text x="548" y="433" class="txt">可能被打断</text>
  <rect x="700" y="410" width="90" height="34" class="bar-exec" rx="8"/>
  <text x="708" y="433" class="txt">就绪即执行</text>
  <rect x="790" y="410" width="250" height="34" class="bar-parse" rx="8"/>
  <text x="800" y="433" class="txt">恢复解析</text>

  <!-- Notes -->
  <rect x="60" y="610" width="1080" height="120" class="note"/>
  <text x="90" y="645" class="lbl">使用建议（进阶）</text>
  <text x="90" y="675" class="sub">• 普通 script：严格按出现顺序执行，但会阻塞 HTML 解析；适合必须立刻执行且依赖前置内容的少量关键脚本</text>
  <text x="90" y="700" class="sub">• defer：不阻塞解析，且按顺序、在 DOM 解析完成后执行；适合绝大多数业务脚本（依赖 DOM、需要顺序）</text>
  <text x="90" y="725" class="sub">• async：不阻塞下载，但执行时机不确定、可能打断解析；适合独立脚本（统计、监控、广告等不依赖 DOM 顺序）</text>
</svg>