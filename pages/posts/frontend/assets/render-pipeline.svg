<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <defs>
    <style>
      .title { font: 700 26px -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif; fill:#0f172a; }
      .txt { font: 600 16px -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif; fill:#0f172a; }
      .sub { font: 500 14px -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif; fill:#334155; }

      .box { fill:#ffffff; stroke:#94a3b8; stroke-width:2; rx:14; }
      .box2 { fill:#f8fafc; stroke:#94a3b8; stroke-width:2; rx:14; }
      .note { fill:#fff7ed; stroke:#fb923c; stroke-width:2; rx:14; }

      .arrow {
        stroke:#475569;
        stroke-width:2.25;
        fill:none;
        stroke-linecap:round;
        stroke-linejoin:round;
        marker-end:url(#mEndSmall);
      }
      .dash {
        stroke:#64748b;
        stroke-width:2.1;
        fill:none;
        stroke-linecap:round;
        stroke-linejoin:round;
        stroke-dasharray:6 7;
        marker-end:url(#mEndSmall);
        opacity:0.95;
      }
    </style>

    <marker id="mEndSmall" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#475569"></path>
    </marker>
  </defs>

  <!-- Title -->
  <text x="60" y="60" class="title">浏览器渲染机制与流程（高层概览）</text>
  <text x="60" y="92" class="sub">解析 HTML/CSS 生成 DOM/CSSOM，再到 Render Tree → Layout → Paint → Composite</text>

  <!-- Row 1 -->
  <rect x="60"  y="130" width="320" height="92" class="box"/>
  <text x="90" y="165" class="txt">1) 网络请求</text>
  <text x="90" y="192" class="sub">DNS / TCP / TLS / HTTP → HTML</text>

  <rect x="440" y="130" width="320" height="92" class="box"/>
  <text x="470" y="165" class="txt">2) 解析 HTML</text>
  <text x="470" y="192" class="sub">Tokenize → Tree Building</text>

  <rect x="820" y="130" width="320" height="92" class="box2"/>
  <text x="850" y="165" class="txt">DOM Tree</text>
  <text x="850" y="192" class="sub">文档结构树（JS 可读写）</text>

  <!-- Row 1 arrows -->
  <path class="arrow" d="M 380 176 L 440 176" />
  <path class="arrow" d="M 760 176 L 820 176" />

  <!-- Row 2 -->
  <rect x="60"  y="250" width="320" height="92" class="note"/>
  <text x="90" y="285" class="txt">外链资源</text>
  <text x="90" y="312" class="sub">CSS 通常阻塞首次渲染；脚本可能阻塞解析</text>

  <rect x="440" y="250" width="320" height="92" class="box"/>
  <text x="470" y="285" class="txt">3) 解析 CSS</text>
  <text x="470" y="312" class="sub">选择器匹配 / 层叠 / 继承</text>

  <rect x="820" y="250" width="320" height="92" class="box2"/>
  <text x="850" y="285" class="txt">CSSOM Tree</text>
  <text x="850" y="312" class="sub">样式规则树（计算样式）</text>

  <!-- Row 2 arrows -->
  <path class="dash" d="M 380 296 L 440 296" />
  <path class="arrow" d="M 760 296 L 820 296" />
  <path class="dash" d="M 220 250 L 220 236 L 600 236 L 600 222" />

  <!-- Row 3 -->
  <rect x="60" y="390" width="380" height="110" class="box"/>
  <text x="90" y="430" class="txt">4) 构建 Render Tree</text>
  <text x="90" y="458" class="sub">DOM + CSSOM → 可视节点（display:none 不进树）</text>

  <rect x="470" y="390" width="220" height="110" class="box"/>
  <text x="500" y="430" class="txt">5) Layout</text>
  <text x="500" y="458" class="sub">计算几何信息（回流/重排）</text>

  <rect x="720" y="390" width="220" height="110" class="box"/>
  <text x="750" y="430" class="txt">6) Paint</text>
  <text x="750" y="458" class="sub">绘制像素（重绘）</text>

  <rect x="970" y="390" width="170" height="110" class="box"/>
  <text x="995" y="430" class="txt">7) Composite</text>
  <text x="995" y="458" class="sub">图层合成→屏幕</text>

  <!-- DOM & CSSOM -> Render Tree -->
  <!-- 从右边框中心出发：DOM (1140,176)，CSSOM (1140,296) -->
  <!-- 右侧外扩通道 x=1185，汇合高度 y=360（空白区），折回到 Render Tree 顶边 -->
  <path class="arrow" d="M 1140 176 L 1185 176 L 1185 360 L 250 360 L 250 390" />
  <path class="arrow" d="M 1140 296 L 1185 296 L 1185 360" />

  <!-- Row 3 arrows -->
  <path class="arrow" d="M 440 445 L 470 445" />
  <path class="arrow" d="M 690 445 L 720 445" />
  <path class="arrow" d="M 940 445 L 970 445" />

  <!-- JS influence -->
  <rect x="60" y="540" width="1080" height="160" class="box2"/>
  <text x="90" y="580" class="txt">JS 的典型影响（运行时）</text>
  <text x="90" y="612" class="sub">• 读写 DOM/CSSOM 可能触发 Style / Layout / Paint</text>
  <text x="90" y="638" class="sub">• 动画优先用 transform/opacity → 更可能只走 Composite</text>
  <text x="90" y="664" class="sub">• 避免频繁“读-写-读”造成强制同步布局（layout thrashing）</text>

  <!-- stage -> JS hint dashed lines -->
  <path class="dash" d="M 250 500 L 250 540" />
  <path class="dash" d="M 580 500 L 580 540" />
  <path class="dash" d="M 830 500 L 830 540" />
  <path class="dash" d="M 1055 500 L 1055 540" />
</svg>